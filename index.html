<!DOCTYPE html>
<html lang="en">
<head>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="iconv2.png">
<link rel="apple-touch-icon" sizes="180x180" href="iconv2.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Food Tally">
<meta name="theme-color" content="#4CAF50">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Tally</title>

<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 16px;
    padding-bottom: 280px;
    background: #f7f7f7;
    max-width: 42rem;
    margin: 0 auto;
  }

  h1 {
    margin-bottom: 8px;
  }

  .panel {
    background: white;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 16px;
  }

  .bar-container {
    background: #eee;
    border-radius: 6px;
    height: 12px;
    margin: 6px 0 12px;
    overflow: hidden;
  }

  .bar {
    height: 100%;
    width: 0%;
    background: #4CAF50;
    transition: width 0.2s ease;
  }

  .subheading {
    font-size: 0.95rem;
    font-weight: 600;
    margin: 0 0 10px;
  }

  .log-empty {
    color: #666;
    font-size: 0.95rem;
    margin: 0;
  }

  .log-list {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .log-item,
  .food {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    background: white;
    padding: 10px;
    border-radius: 8px;
  }

  .food {
    margin-bottom: 8px;
  }

  .log-item {
    margin-bottom: 0;
    padding: 8px 0;
    border-radius: 0;
    border-bottom: 1px solid #eee;
  }

  .log-item:last-child {
    border-bottom: none;
  }

  .log-item-text {
    flex: 1;
    font-size: 0.95rem;
    min-width: 0;
  }

  .food-name {
    flex: 1;
  }

  .log-meta {
    display: block;
    font-size: 0.8rem;
    color: #666;
    margin-top: 2px;
  }

  button {
    font-size: 16px;
    padding: 6px 12px;
    border-radius: 6px;
    border: none;
    background: #4CAF50;
    color: white;
    cursor: pointer;
  }

  button:active {
    transform: scale(0.98);
  }

  .remove-btn {
    background: #888;
    font-size: 14px;
    padding: 5px 10px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .undo-last {
    background: #666;
  }

  .reset {
    background: #e74c3c;
  }

  .button-row {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 10px;
  }

  .tally-panel {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 32px);
    max-width: 42rem;
    bottom: max(16px, env(safe-area-inset-bottom));
    z-index: 1000;
    margin: 0;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  }

  #log {
    max-height: 140px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  @media (min-width: 640px) {
    .button-row {
      flex-direction: row;
    }

    .button-row button {
      flex: 1;
    }
  }
</style>
</head>

<body>

<h1>Daily Protein and Fiber Tally</h1>

<div class="panel">
  <div><strong>Protein:</strong> <span id="protein">0</span> / 130g</div>
  <div class="bar-container"><div id="proteinBar" class="bar"></div></div>

  <div><strong>Fiber:</strong> <span id="fiber">0</span> / 30g</div>
  <div class="bar-container"><div id="fiberBar" class="bar"></div></div>
</div>

<div id="foods"></div>

<div class="panel tally-panel" id="tallyPanel">
  <p class="subheading">Today’s tally</p>
  <div id="log"></div>

  <div class="button-row">
    <button class="undo-last" onclick="undoLastTap()">Undo Last Tap</button>
    <button class="reset" onclick="resetDay()">Reset Day</button>
  </div>
</div>

<script>
const PROTEIN_GOAL = 130;
const FIBER_GOAL = 30;

const foods = [
  { name: "Almonds (2 tbsp)", protein: 3, fiber: 2 },
  { name: "Apple (½)", protein: 0, fiber: 2 },
  { name: "Berries (¼ cup)", protein: 0, fiber: 2 },
  { name: "Black beans (½ cup)", protein: 7, fiber: 7 },
  { name: "Broccoli (½ cup)", protein: 2, fiber: 2.5 },
  { name: "Chicken (2 oz)", protein: 15, fiber: 0 },
  { name: "Chia (1 tbsp)", protein: 2.5, fiber: 5 },
  { name: "Chickpeas (½ cup)", protein: 7, fiber: 6 },
  { name: "Edamame (½ cup)", protein: 8, fiber: 4 },
  { name: "Eggs (1)", protein: 6, fiber: 0 },
  { name: "Flax (1 tbsp)", protein: 1.5, fiber: 2 },
  { name: "Greek yogurt (½ cup)", protein: 10, fiber: 0 },
  { name: "Green peas (½ cup)", protein: 4, fiber: 3 },
  { name: "Lentils (½ cup)", protein: 9, fiber: 8 },
  { name: "Oats (¼ cup)", protein: 2.5, fiber: 2 },
  { name: "Peanut butter (1 tbsp)", protein: 4, fiber: 1 },
  { name: "Protein powder (½ scoop)", protein: 12, fiber: 1 },
  { name: "Quinoa (½ cup)", protein: 4, fiber: 2 },
  { name: "Sweet potato (½)", protein: 1, fiber: 2 },
  { name: "Tofu", protein: 10, fiber: 1 },
  { name: "Whole grain bread (1 slice)", protein: 4, fiber: 3 }
];

let totals = { protein: 0, fiber: 0 };
let logEntries = [];

const today = new Date().toDateString();
const savedDate = localStorage.getItem("date");

if (savedDate !== today) {
  localStorage.setItem("date", today);
  localStorage.setItem("totals", JSON.stringify({ protein: 0, fiber: 0 }));
  localStorage.setItem("logEntries", JSON.stringify([]));
}

const savedTotals = JSON.parse(localStorage.getItem("totals"));
if (savedTotals) totals = savedTotals;

const savedLog = JSON.parse(localStorage.getItem("logEntries"));
if (savedLog) logEntries = savedLog;

function saveState() {
  localStorage.setItem("totals", JSON.stringify(totals));
  localStorage.setItem("logEntries", JSON.stringify(logEntries));
}

function updateDisplay() {
  document.getElementById("protein").innerText = totals.protein.toFixed(1);
  document.getElementById("fiber").innerText = totals.fiber.toFixed(1);

  document.getElementById("proteinBar").style.width =
    Math.min((totals.protein / PROTEIN_GOAL) * 100, 100) + "%";

  document.getElementById("fiberBar").style.width =
    Math.min((totals.fiber / FIBER_GOAL) * 100, 100) + "%";

  renderLog();
}

function addFood(index) {
  const food = foods[index];

  totals.protein += food.protein;
  totals.fiber += food.fiber;

  logEntries.push({
    id: Date.now() + Math.random(),
    name: food.name,
    protein: food.protein,
    fiber: food.fiber
  });

  saveState();
  updateDisplay();
}

function removeEntry(id) {
  const index = logEntries.findIndex(entry => entry.id === id);
  if (index === -1) return;

  const entry = logEntries[index];

  totals.protein -= entry.protein;
  totals.fiber -= entry.fiber;

  totals.protein = Math.max(0, totals.protein);
  totals.fiber = Math.max(0, totals.fiber);

  logEntries.splice(index, 1);

  saveState();
  updateDisplay();
}

function undoLastTap() {
  if (logEntries.length === 0) return;
  const lastEntry = logEntries[logEntries.length - 1];
  removeEntry(lastEntry.id);
}

function resetDay() {
  totals = { protein: 0, fiber: 0 };
  logEntries = [];
  saveState();
  updateDisplay();
}

function renderLog() {
  const logContainer = document.getElementById("log");

  if (logEntries.length === 0) {
    logContainer.innerHTML = '<p class="log-empty">Nothing tallied yet.</p>';
    return;
  }

  const reversedEntries = [...logEntries].reverse();

  logContainer.innerHTML = `
    <div class="log-list">
      ${reversedEntries.map((entry) => `
        <div class="log-item">
          <div class="log-item-text">
            ${entry.name}
            <span class="log-meta">${entry.protein}g protein · ${entry.fiber}g fiber</span>
          </div>
          <button class="remove-btn" onclick="removeEntry(${JSON.stringify(entry.id)})">Remove</button>
        </div>
      `).join("")}
    </div>
  `;
}

const container = document.getElementById("foods");

foods.forEach((food, index) => {
  const div = document.createElement("div");
  div.className = "food";
  div.innerHTML = `
    <span class="food-name">${food.name}</span>
    <button onclick="addFood(${index})">+1</button>
  `;
  container.appendChild(div);
});

updateDisplay();
</script>

</body>
</html>
